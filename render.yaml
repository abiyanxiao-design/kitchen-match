services:
  - type: web
    name: kitchen-match
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: KITCHEN_HOST
        value: 0.0.0.0
      - key: KITCHEN_PORT
        value: 8000
      - key: KITCHEN_DATA_DIR
        value: /tmp

    
